# prefix를 Ctrl+q로 변경 (Claude Code가 Ctrl+b 사용하므로 충돌 방지)
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# ───────────────────────────────────────────
# Claude Code 최적화
# ───────────────────────────────────────────

# 색상 및 렌더링
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"

# 동기화 출력 (DEC 2026) - Ghostty 네이티브 지원
set -as terminal-overrides ",xterm-ghostty:Sync"

# Escape 키 지연 제거 (기본 500ms → 0ms)
set -sg escape-time 0

# OSC 시퀀스 패스스루 (알림, 클립보드 등)
set -g allow-passthrough on
set -g set-clipboard external

# 포커스 이벤트 전달
set -g focus-events on

# ───────────────────────────────────────────
# 일반 설정
# ───────────────────────────────────────────

# 마우스 스크롤
set -g mouse on

# 히스토리 버퍼 확대
set -g history-limit 50000

# Claude Code Compose Bar (Ctrl+D)
bind -T root C-d run-shell 'tmux split-window -v -l 8 "claude-compose #{pane_id}"'
